[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "omnibase_spi"
version = "0.20.5"
description = "ONEX Service Provider Interface - Protocol definitions"
authors = [
    {name = "OmniNode.ai", email = "jonah@omninode.ai"},
]
license = {text = "MIT"}
readme = "README.md"
requires-python = ">=3.12"
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Typing :: Typed",
]
# Note: omnibase-core is a workspace sibling package (not on PyPI).
# For local development, install via: uv sync --group dev
# or add a [tool.uv.sources] entry pointing to the sibling checkout.
dependencies = [
    "typing-extensions>=4.5.0",
    "pydantic>=2.11.7",
    "omnibase-core>=0.19.0", # Workspace dependency - see note above
]

[project.urls]
Homepage = "https://github.com/OmniNode-ai/omnibase_spi"
Repository = "https://github.com/OmniNode-ai/omnibase_spi"
Documentation = "https://github.com/OmniNode-ai/omnibase_spi/tree/main/docs"

[dependency-groups]
dev = [
    "mypy>=1.13.0",
    "pre-commit>=4.0.0",
    "pytest>=8.4.1",
    "pytest-asyncio>=0.24.0",
    "hypothesis>=6.88.0",
    "ruff>=0.8.0",
    "requests>=2.32.5",
    "types-requests>=2.32.4.20250913",
    "pyyaml>=6.0.3",
    "pytest-cov>=7.0.0",
    "types-pyyaml>=6.0.12.20250915",
]

[tool.hatch.build.targets.wheel]
packages = ["src/omnibase_spi"]

[tool.uv.sources]
omnibase-core = { git = "https://github.com/OmniNode-ai/omnibase_core.git", branch = "main" }

[tool.ruff]
line-length = 88
target-version = "py312"
exclude = [
    "tests/fixtures/validation/",
    ".github/workflows/",
]

[tool.ruff.lint]
# Standard 40-rule set (shared across ONEX repos) + D-series (SPI-specific: docstring requirement [internal issue])
select = ["E", "F", "W", "C90", "I", "N", "UP", "YTT", "S", "BLE", "FBT", "B", "A", "COM", "C4", "DTZ", "T10", "EM", "EXE", "ISC", "ICN", "G", "INP", "PIE", "T20", "PT", "Q", "RSE", "RET", "SLF", "SIM", "TID", "TCH", "ARG", "PTH", "ERA", "PD", "PGH", "PL", "TRY", "NPY", "RUF",
    # SPI-specific: docstring linting [internal issue] - require docstrings on public APIs
    "D100", "D101", "D201", "D202", "D207", "D208", "D209", "D210", "D211", "D300", "D403", "D419",
]
ignore = [
    "S101",      # Allow assert statements in tests
    "COM812",    # Trailing comma rule conflicts with formatter
    "E501",      # Line too long (handled by formatter)
    "B008",      # Do not perform function calls in argument defaults
    "C901",      # Too complex
    "FBT001",    # Boolean type hint positional argument (SPI protocols use bool params extensively)
    "FBT002",    # Boolean default value positional argument
    "TRY003",    # Raise vanilla args (protocol docstrings show exception patterns)
    "EM101",     # Raw string in exception
    "EM102",     # F-string in exception
    "PLR0913",   # Too many arguments (protocol methods have many params by design)
    "ERA001",    # Commented-out code (historical protocol evolution comments)
    "PLC0105",   # Type name incorrect variance (TypeVar naming in protocols)
    "TID252",    # Relative imports (used in protocol __init__.py re-exports)
    "TC001",     # Typing-only first-party import (Protocol files need runtime imports for type annotations)
    "TC003",     # Typing-only standard-library import (Protocol type annotations used at runtime)
    "PLE0604",   # Invalid __all__ object (pre-existing, separate cleanup ticket)
    "RUF022",    # Unsorted __all__ (pre-existing, cosmetic)
    "TRY004",    # Type check without TypeError (pre-existing pattern)
    "PLR2004",   # Magic value comparison (acceptable in protocol definitions)
]

[tool.ruff.lint.per-file-ignores]
"scripts/validation/*.py" = [
    "SIM102",  # nested if statements (readability preference in validators)
    "SIM103",  # return condition directly (clarity in boolean functions)
    "ARG002",  # unused method argument (signal handlers, visitor pattern)
    "B904",    # raise from (acceptable in test utilities)
    "T20",     # print() statements (validation scripts produce stdout output)
    "S603",    # subprocess calls in validation scripts
    "PLR2004", # magic values in validation thresholds
    "PLC0415", # late imports (conditional imports in validators)
    "BLE001",  # blind except (validation scripts catch broadly)
    "N806",    # non-lowercase variable (validation scripts use descriptive names)
    "PLR0912", # too many branches (validators are complex by nature)
    "PLR0911", # too many return statements
    "PLR0915", # too many statements
    "PLR1714", # repeated equality comparison
    "PLW1510", # subprocess.run without check
    "PLW2901", # redefined loop name
    "PTH123",  # builtin open (validation scripts)
    "PTH108",  # os.unlink
    "PTH110",  # os.path.exists
    "PTH118",  # os.path.join
    "PTH112",  # os.path.isdir
    "PTH120",  # os.path.dirname
    "PTH122",  # os.path.splitext
    "S108",    # hardcoded temp file
    "S110",    # try-except-pass
    "S112",    # try-except-continue
    "SLF001",  # private member access (validation inspects internals)
    "EXE001",  # shebang not executable
    "RUF012",  # mutable class default
    "RUF005",  # collection literal concatenation
    "RUF013",  # implicit optional
    "RET504",  # unnecessary assign
    "PIE810",  # multiple starts/ends with
    "TRY300",  # try-consider-else
    "TRY301",  # raise within try
    "N817",    # camelcase imported as acronym
    "N814",    # camelcase imported as constant
    "RUF001",  # ambiguous unicode character
    "S324",    # hashlib insecure hash
    "N801",    # invalid class name (test helpers)
    "N813",    # camelcase imported as lowercase
    "A001",    # builtin variable shadowing
]
"tests/*.py" = [
    "ARG002",  # unused method argument (mock implementations)
    "UP038",   # isinstance tuple (readability in tests)
    "SIM118",  # key in dict.keys() (explicit in tests)
    "B007",    # unused loop variable (intentional in test iteration)
    "E402",    # import not at top (path manipulation in tests)
